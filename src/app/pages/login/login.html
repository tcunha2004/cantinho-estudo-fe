<main class="min-h-dvh bg-cream flex items-center justify-center p-6">
  <div class="w-full max-w-sm">
    <!-- Marca -->
    <header class="flex flex-col items-center text-center mb-8">
      <h1 class="mb-3">
        <img
          src="cantinho-estudo-logo.jpeg"
          alt="Cantinho do Estudo — desde 2003"
          class="mx-auto w-full max-w-64"
        />
      </h1>
    </header>

    <!-- Card de login -->
    <form class="rounded-2xl border border-line bg-white p-6 shadow-sm">
      <!-- Papel -->
      <fieldset>
        <legend class="mb-2 text-sm font-bold">Entrar como</legend>
        <div class="grid grid-cols-3 gap-2" role="group" aria-label="Papel do usuário">
          @for (role of roles; track role.value) {
            <button
              type="button"
              (click)="selectRole(role.value)"
              [attr.aria-pressed]="selectedRole() === role.value"
              class="flex flex-col items-center gap-1.5 rounded-xl border px-2 py-3 text-xs font-bold transition-colors"
              [class]="
                selectedRole() === role.value
                  ? 'border-accent bg-accent-soft text-accent'
                  : 'border-line text-ink-soft hover:bg-cream'
              "
            >
              @switch (role.value) {
                @case ('aluno') {
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    class="size-5"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    aria-hidden="true"
                  >
                    <path
                      d="M21.42 10.922a1 1 0 0 0-.019-1.838L12.83 5.18a2 2 0 0 0-1.66 0L2.6 9.08a1 1 0 0 0 0 1.832l8.57 3.908a2 2 0 0 0 1.66 0z"
                    />
                    <path d="M22 10v6" />
                    <path d="M6 12.5V16a6 3 0 0 0 12 0v-3.5" />
                  </svg>
                }
                @case ('professor') {
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    class="size-5"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    aria-hidden="true"
                  >
                    <path d="M2 3h20" />
                    <path d="M21 3v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V3" />
                    <path d="m7 21 5-5 5 5" />
                  </svg>
                }
                @case ('admin') {
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    class="size-5"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    aria-hidden="true"
                  >
                    <path
                      d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"
                    />
                  </svg>
                }
              }
              {{ role.label }}
            </button>
          }
        </div>
      </fieldset>

      <!-- E-mail -->
      <div class="mt-5">
        <label for="email" class="mb-1.5 block text-sm font-bold">E-mail</label>
        <input
          id="email"
          type="email"
          name="email"
          autocomplete="email"
          placeholder="voce@exemplo.com"
          class="w-full rounded-xl border border-line bg-white px-4 py-2.5 text-sm placeholder:text-ink-soft/60 transition-colors focus:border-accent focus:outline-none focus:ring-2 focus:ring-accent/20"
        />
      </div>

      <!-- Senha -->
      <div class="mt-4">
        <label for="password" class="mb-1.5 block text-sm font-bold">Senha</label>
        <div class="relative">
          <input
            id="password"
            [type]="showPassword() ? 'text' : 'password'"
            name="password"
            autocomplete="current-password"
            placeholder="••••••••"
            class="w-full rounded-xl border border-line bg-white px-4 py-2.5 pr-11 text-sm placeholder:text-ink-soft/60 transition-colors focus:border-accent focus:outline-none focus:ring-2 focus:ring-accent/20"
          />
          <button
            type="button"
            (click)="togglePassword()"
            class="absolute inset-y-0 right-0 flex w-11 items-center justify-center text-ink-soft transition-colors hover:text-ink"
            [attr.aria-label]="showPassword() ? 'Ocultar senha' : 'Mostrar senha'"
          >
            @if (showPassword()) {
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="size-5"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                aria-hidden="true"
              >
                <path
                  d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"
                />
                <path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61" />
                <line x1="2" x2="22" y1="2" y2="22" />
              </svg>
            } @else {
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="size-5"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                aria-hidden="true"
              >
                <path
                  d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"
                />
                <circle cx="12" cy="12" r="3" />
              </svg>
            }
          </button>
        </div>
      </div>

      <div class="mt-3 text-right">
        <a href="#" class="text-sm font-bold text-accent hover:text-accent-strong"
          >Esqueci minha senha</a
        >
      </div>

      <button
        type="submit"
        class="mt-5 w-full rounded-xl bg-accent py-3 font-display text-base font-bold text-white shadow-sm transition-colors hover:bg-accent-strong"
      >
        Entrar
      </button>
    </form>

    <p class="mt-6 text-center text-xs text-ink-soft">© 2026 Cantinho do Estudo</p>
  </div>
</main>
