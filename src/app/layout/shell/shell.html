<div class="min-h-dvh bg-cream">
  <aside class="fixed inset-y-0 left-0 flex w-64 flex-col border-r border-line bg-white">
    <!-- Logo -->
    <div class="px-6 pb-5 pt-7">
      <img src="cantinho-estudo-logo.jpeg" alt="Cantinho do Estudo" class="w-36" />
    </div>
    <div class="mx-6 border-t border-line"></div>

    <!-- Navegação -->
    <nav class="flex-1 space-y-1.5 overflow-y-auto p-4" aria-label="Menu principal">
      @for (item of navItems(); track item.path) {
        <a
          [routerLink]="item.path"
          routerLinkActive="active"
          class="nav-link flex items-center gap-3.5 rounded-2xl px-4 py-3 font-bold text-ink-soft transition-colors hover:bg-cream"
        >
          <app-icon [name]="item.icon" class="size-5 shrink-0" />
          {{ item.label }}
        </a>
      }
    </nav>

    <!-- Rodapé -->
    <div class="border-t border-line p-4">
      <!-- Seletor temporário de papel, até existir login real -->
      <p class="px-2 text-[11px] font-bold uppercase tracking-wide text-ink-soft/70">
        Visualizar como
      </p>
      <div class="mt-2 grid grid-cols-3 gap-1">
        @for (option of roleOptions; track option.value) {
          <button
            type="button"
            (click)="switchRole(option.value)"
            [attr.aria-pressed]="role() === option.value"
            class="rounded-lg px-1 py-1.5 text-xs font-bold transition-colors"
            [class]="
              role() === option.value
                ? 'bg-accent-soft text-accent'
                : 'text-ink-soft hover:bg-cream'
            "
          >
            {{ option.label }}
          </button>
        }
      </div>

      <a
        routerLink="/login"
        class="mt-3 flex items-center gap-3.5 rounded-2xl px-4 py-2.5 font-bold text-ink-soft transition-colors hover:bg-cream"
      >
        <app-icon name="log-out" class="size-5 shrink-0" />
        Sair
      </a>
    </div>
  </aside>

  <!-- Área de conteúdo -->
  <main class="ml-64 min-h-dvh p-8">
    <router-outlet />
  </main>
</div>
